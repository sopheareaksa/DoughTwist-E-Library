<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — DoughTwist Library</title>
    <meta name="description" content="Create a DoughTwist Library account to save resources and track your reading progress.">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <a href="../index.html" class="logo">
                DoughTwist
            </a>

            <button class="menu-toggle" aria-label="Open menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="discover.html">Discover</a></li>
                    <li><a href="categories.html">Categories</a></li>
                    <li><a href="resources.html">Resources</a></li>
                </ul>
                <div class="nav-actions">
                    <a href="login.html" class="btn btn-login">Login</a>
                    <a href="register.html" class="btn btn-register">Register</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="auth-main">
        <div class="hero-bg" aria-hidden="true">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <h1>Create your account</h1>
                <p>Join DoughTwist to save resources and build your reading lists.</p>
            </div>

            <form class="auth-form" action="#" method="post">
                <div class="form-group">
                    <label for="fullName">Full name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Jane Doe" autocomplete="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="new-password" minlength="8" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" autocomplete="new-password" minlength="8" required>
                </div>
                <button type="submit" class="btn-submit">Create account</button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </p>
        </div>
    </main>

    <script>
        const toggle = document.querySelector('.menu-toggle');
        const nav = document.querySelector('.main-nav');

        toggle.addEventListener('click', () => {
            const expanded = toggle.getAttribute('aria-expanded') === 'true';
            toggle.setAttribute('aria-expanded', !expanded);
            toggle.classList.toggle('open', !expanded);
            nav.classList.toggle('open', !expanded);
        });
    </script>
</body>
</html>
